name: Install Guard

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  install-build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci 2>&1 | tee npm-ci.log
          if grep -Eiq '^npm warn' npm-ci.log; then
            echo "npm ci emitted warnings. Treating as failure."
            exit 1
          fi

      - name: Build workspaces
        run: npm run build

      - name: Run unit tests
        run: npm test
